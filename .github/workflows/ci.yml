name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend deps
        run: cd backend && npm ci
      - name: Run backend tests
        run: cd backend && npm test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Run frontend tests (vitest)
        run: cd frontend && npm test
      - name: Build frontend
        run: cd frontend && npm run build

  test-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install scraper deps
        run: cd scraper && pip install -r requirements.txt
      - name: Run scraper tests
        run: cd scraper && pytest tests/ -v

  test-ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install ai-module deps
        run: cd ai-module && pip install -r requirements.txt
      - name: Run ai-module tests
        run: cd ai-module && pytest tests/ -v

  build-docker:
    needs: [test-backend, test-frontend, test-scraper, test-ai]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build ./backend
      - name: Build scraper image
        run: docker build ./scraper
      - name: Build ai-module image
        run: docker build ./ai-module
