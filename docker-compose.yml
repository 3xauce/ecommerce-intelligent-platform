# Nom de projet Compose explicite : évite toute ambiguïté avec d'autres
# stacks Docker qui tourneraient en parallèle sur la même machine.
name: ecommerce-intelligent-platform

services:
  frontend:
    build: ./frontend
    ports:
      - '3010:3000'
    environment:
      - REACT_APP_API_URL=http://localhost:5001/api
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      # Port hôte 5001 (et non 5000) : 5000 est réservé par Windows/Hyper-V
      # sur certaines machines (netsh interface ipv4 show excludedportrange),
      # ce qui provoque une erreur EACCES au démarrage du conteneur.
      - '5001:5001'
    env_file:
      - ./backend/.env
    environment:
      # Toujours joindre Postgres/Redis via le réseau interne Docker
      # (nom de service), quel que soit ce que backend/.env pointe pour
      # un usage hors-Docker (npm run dev en local).
      - PORT=5001
      - FRONTEND_URL=http://localhost:3010
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ecommerce_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  scraper:
    build: ./scraper
    env_file:
      - ./scraper/.env
    depends_on:
      - backend

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Port hôte 5433 (et non 5432) pour ne pas entrer en conflit avec
      # une autre instance PostgreSQL déjà lancée sur la machine.
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin

volumes:
  postgres_data:

